name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      # The default suite includes focused browser collector contracts. Full generated-app
      # integration (FRONTEND_AUTOPILOT_E2E=1) remains opt-in and runs locally.
      - run: npm test
