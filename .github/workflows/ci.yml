name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Offline unit tests only. The e2e integration test (FRONTEND_AUTOPILOT_E2E=1) needs a
      # Playwright browser + npm registry and is run locally, not in CI.
      - run: npm test
